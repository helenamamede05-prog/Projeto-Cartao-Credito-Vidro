<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Glass Credit Card</title>

    <link rel="stylesheet"
        href="./style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="circulo circulo1"></div>
    <div class="circulo circulo2"></div>

    <div class="card">

        <div class="frente">

            <div class="topo">

                <div class="logo">

                    <div class="bola vermelha"></div>
                    <div class="bola amarela"></div>

                    <span>Master Card</span>

                </div>

                <div class="chip"></div>

            </div>

            <div class="numero">

                <p>Numero do Cartão</p>

                <h2>
                    8050 5040 2030 3020
                </h2>

            </div>

            <div class="rodape">

                <div>

                    <p>Helena Sousa</p>

                </div>

                <div>

                    <small>Valid Thru</small>

                    <h3>05/28</h3>

                </div>

            </div>

        </div>

        <div class="verso">

            <small>
                Para atendimento ao cliente, ligue
                028922 ou email cartãomaster@gmail.com
            </small>

            <div class="faixa"></div>

            <div class="codigo">

                <div class="cvv"></div>
                <span>005</span>
            </div>

            <p>
                Aproveite, estamos a disposição
            </p>

        </div>

    </div>

    <script src="./js/script.js"></script>

</body>
</html>
